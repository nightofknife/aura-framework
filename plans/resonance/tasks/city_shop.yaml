get_city_name:
  meta:
    title: Get Current City Name
    description: Click 访问城市/访问地区 and parse current city from OCR.
    inputs: []
  steps:
    wait_visit_city_text:
      action: wait_for_text
      params:
        text_to_find: "访问城市"
        timeout: 3.0
        interval: 0.5
        region: [1000, 450, 250, 70]
        match_mode: "contains"
    wait_visit_region_text:
      action: wait_for_text
      params:
        text_to_find: "访问地区"
        timeout: 3.0
        interval: 0.5
        region: [1000, 450, 250, 70]
        match_mode: "contains"
    click_visit_city:
      action: find_text_and_click
      params:
        text_to_find: "访问城市"
        region: [1000, 450, 250, 70]
        match_mode: "contains"
      depends_on: wait_visit_city_text
      when: "{{ nodes.wait_visit_city_text.output.found | default(false) }}"
    click_visit_region_fallback:
      action: find_text_and_click
      params:
        text_to_find: "访问地区"
        region: [1000, 450, 250, 70]
        match_mode: "contains"
      depends_on:
        all:
          - wait_visit_region_text: "success|failed|skipped"
          - click_visit_city: "success|failed|skipped"
      when: "{{ (not (nodes.click_visit_city.output | default(false))) and (nodes.wait_visit_region_text.output.found | default(false)) }}"
    wait_after_click_visit_city:
      action: sleep
      params:
        seconds: 2.0
      depends_on:
        all:
          - wait_visit_city_text: "success|failed|skipped"
          - wait_visit_region_text: "success|failed|skipped"
          - click_visit_city: "success|failed|skipped"
          - click_visit_region_fallback: "success|failed|skipped"
    assert_visit_clicked:
      action: assert_condition
      params:
        condition: "{{ (nodes.click_visit_city.output | default(false)) or (nodes.click_visit_region_fallback.output | default(false)) }}"
        message: "failed to click 访问城市/访问地区"
      depends_on: wait_after_click_visit_city
    wait_city_scene:
      action: sleep
      params:
        seconds: 2.0
      depends_on: assert_visit_clicked
    read_city_text:
      action: get_text_in_region
      params:
        region: [170, 520, 400, 50]
        join_with: " "
      depends_on: wait_city_scene
    wait_after_read_city_text:
      action: sleep
      params:
        seconds: 2.0
      depends_on: read_city_text
    resolve_city:
      action: resonance.resolve_city_shop_point
      params:
        ocr_city_text: "{{ nodes.read_city_text.output }}"
        shop_type: "exchange"
        location_file_path: "data/meta/location.json"
      depends_on: wait_after_read_city_text
  returns:
    success: true
    city_key: "{{ nodes.resolve_city.output.city_key }}"
    city_name: "{{ nodes.resolve_city.output.city_name }}"

enter_city_shop:
  meta:
    title: Enter City Shop
    description: Enter target shop in current city via OCR + location mapping.
    entry_point: true
    inputs:
      - name: shop_type
        type: string
        required: true
  steps:
    get_city_name_sub:
      action: aura.run_task
      params:
        task_ref: "tasks:city_shop.yaml:get_city_name"
        inputs: {}
    resolve_shop_point:
      action: resonance.resolve_city_shop_point
      params:
        ocr_city_text: "{{ nodes.get_city_name_sub.output.nodes.resolve_city.output.city_key }}"
        shop_type: "{{ inputs.shop_type }}"
        location_file_path: "data/meta/location.json"
      depends_on: get_city_name_sub
    wait_after_resolve_shop_point:
      action: sleep
      params:
        seconds: 2.0
      depends_on: resolve_shop_point
    click_shop:
      action: click
      params:
        x: "{{ nodes.resolve_shop_point.output.x }}"
        y: "{{ nodes.resolve_shop_point.output.y }}"
      depends_on: wait_after_resolve_shop_point
  returns:
    success: true
    city_name: "{{ nodes.get_city_name_sub.output.nodes.resolve_city.output.city_name }}"
    shop_type: "{{ inputs.shop_type }}"
