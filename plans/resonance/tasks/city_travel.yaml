intercity_select_destination:
  meta:
    title: Intercity Select Destination
    description: 点击启程并选择目标城市，然后前往并进入站点。
    entry_point: true
    inputs:
      - name: to_city_name
        type: string
        required: true
      - name: enter_station_timeout_seconds
        type: number
        required: false
        default: 600

  steps:
    wait_depart_text:
      action: wait_for_text
      params:
        text_to_find: "启程"
        timeout: 3.0
        interval: 0.5
        region: [0, 0, 1280, 720]
        match_mode: "contains"

    click_depart:
      action: find_text_and_click
      params:
        text_to_find: "启程"
        timeout: 3.0
        interval: 0.5
        region: [0, 0, 1280, 720]
        match_mode: "contains"
      depends_on: wait_depart_text

    wait_intercity_scene:
      action: sleep
      params:
        seconds: 1.0
      depends_on: click_depart

    select_destination:
      action: resonance.select_intercity_destination
      params:
        to_city_name: "{{ inputs.to_city_name }}"
        location_file_path: "data/meta/location.json"
        city_search_region: [130, 70, 1000, 550]
        drag_center: [640, 360]
        drag_span_px: 450
        max_search_steps: 12
        fallback_enabled: true
        target_match_mode: "contains"
        click_y_offset: -15
        drag_duration_sec: 1.0
        drag_hold_sec: 0.5
      depends_on: wait_intercity_scene

    wait_go_destination_text:
      action: wait_for_text
      params:
        text_to_find: "前往目的地"
        timeout: 3.0
        interval: 0.5
        region: [0, 0, 1280, 720]
        match_mode: "contains"
      depends_on: select_destination

    click_go_destination:
      action: find_text_and_click
      params:
        text_to_find: "前往目的地"
        timeout: 3.0
        interval: 0.5
        region: [0, 0, 1280, 720]
        match_mode: "contains"
      depends_on: wait_go_destination_text

    wait_traveling:
      action: sleep
      params:
        seconds: 1.0
      depends_on: click_go_destination

    wait_enter_station_text:
      action: wait_for_text
      params:
        text_to_find: "进入站点"
        timeout: "{{ inputs.enter_station_timeout_seconds }}"
        interval: 3.0
        region: [0, 0, 1280, 720]
        match_mode: "contains"
      depends_on: wait_traveling

    click_enter_station:
      action: find_text_and_click
      params:
        text_to_find: "进入站点"
        timeout: 3.0
        interval: 0.5
        region: [0, 0, 1280, 720]
        match_mode: "contains"
      depends_on: wait_enter_station_text

  returns:
    success: true
    to_city_name: "{{ nodes.select_destination.output.to_city_name }}"
    to_city_key: "{{ nodes.select_destination.output.to_city_key }}"
    selected_point: "{{ nodes.select_destination.output.selected_point }}"
    mode: "{{ nodes.select_destination.output.mode }}"
    attempts_used: "{{ nodes.select_destination.output.attempts_used }}"
