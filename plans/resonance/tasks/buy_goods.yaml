buy_goods:
  meta:
    title: Buy Goods
    description: Buy target goods by OCR scanning with up to 5 swipes.
    entry_point: true
    inputs:
      - name: product_list
        type: list
        required: true
        min_items: 1
  steps:
    wait_i_want_buy_text:
      action: wait_for_text
      params:
        text_to_find: "我要买"
        timeout: 3.0
        interval: 0.5
        region: [720, 280, 280, 420]
        match_mode: "contains"
    click_i_want_buy:
      action: find_text_and_click
      params:
        text_to_find: "我要买"
        region: [720, 280, 280, 420]
        match_mode: "contains"
      depends_on: wait_i_want_buy_text
    assert_i_want_buy_clicked:
      action: assert_condition
      params:
        condition: "{{ nodes.click_i_want_buy.output }}"
        message: "failed to click 我要买"
      depends_on: click_i_want_buy
    wait_after_i_want_buy:
      action: sleep
      params:
        seconds: 1.0
      depends_on: assert_i_want_buy_clicked

    pending_round_0:
      action: log
      params:
        message: "init pending product list"
      depends_on: wait_after_i_want_buy
      outputs:
        pending_products: "{{ inputs.product_list | list }}"
        pending_count: "{{ (inputs.product_list | list) | length }}"

    scan_round_1:
      action: recognize_all_text
      params:
        region: [620, 130, 210, 520]
      depends_on: pending_round_0
    calc_round_1:
      action: log
      params:
        message: "calc round 1 hits"
      depends_on: scan_round_1
      outputs:
        recognized_texts: "{{ nodes.scan_round_1.output.results | map(attribute='text') | list }}"
        round_hits: "{{ nodes.pending_round_0.pending_products | select('in', (nodes.scan_round_1.output.results | map(attribute='text') | list)) | list }}"
    click_round_1_hits:
      action: find_text_and_click
      params:
        text_to_find: "{{ loop.item }}"
        region: [620, 130, 210, 520]
        match_mode: "contains"
      loop:
        for_each: "{{ nodes.calc_round_1.round_hits }}"
        parallelism: 1
      depends_on: calc_round_1
    pending_round_1:
      action: log
      params:
        message: "calc round 1 pending"
      depends_on: click_round_1_hits
      outputs:
        pending_products: "{{ nodes.pending_round_0.pending_products | reject('in', nodes.calc_round_1.round_hits) | list }}"
        pending_count: "{{ (nodes.pending_round_0.pending_products | reject('in', nodes.calc_round_1.round_hits) | list) | length }}"
    move_to_drag_start_round_1:
      action: move_to
      params:
        x: 670
        y: 450
        duration: 0.1
      depends_on: pending_round_1
      when: "{{ nodes.pending_round_1.pending_count > 0 }}"
    mouse_down_drag_round_1:
      action: mouse_down
      params:
        button: "left"
      depends_on:
        move_to_drag_start_round_1: "success|skipped"
      when: "{{ nodes.pending_round_1.pending_count > 0 }}"
    move_to_drag_end_round_1:
      action: move_to
      params:
        x: 670
        y: 200
        duration: 0.5
      depends_on:
        mouse_down_drag_round_1: "success|skipped"
      when: "{{ nodes.pending_round_1.pending_count > 0 }}"
    hold_after_drag_round_1:
      action: sleep
      params:
        seconds: 0.5
      depends_on:
        move_to_drag_end_round_1: "success|skipped"
      when: "{{ nodes.pending_round_1.pending_count > 0 }}"
    mouse_up_drag_round_1:
      action: mouse_up
      params:
        button: "left"
      depends_on:
        hold_after_drag_round_1: "success|skipped"
      when: "{{ nodes.pending_round_1.pending_count > 0 }}"

    scan_round_2:
