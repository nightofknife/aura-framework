package:
  name: '@Aura-Project/base'
  version: 1.0.0
  description: Provides the foundational services (like OCR, Vision, Controller) and
    atomic actions for the Aura framework. This package is essential for most automation
    tasks.
  license: MIT
  authors:
  - name: Aura Project Team
    email: team@aura-project.com
  homepage: https://github.com/aura-project/aura
  repository: https://github.com/aura-project/aura.git
  keywords:
  - base
  - core
  - automation
  - vision
  - ocr
  - controller
  categories:
  - core
  - automation
requires:
  aura: '>=3.0.0, <4.0.0'
  python: '>=3.10'
  platform: all
dependencies: {}
pypi-dependencies:
  paddleocr: '*'
  paddlepaddle: '*'
  pillow: '*'
  opencv-python: '*'
  numpy: '*'
  ultralytics: '*'
  torch: '*'
  pyautogui: '*'
  pygetwindow: '*'
  pyyaml: '*'
exports:
  services: []
  actions: []
  tasks: []
lifecycle: {}
configuration:
  default_config: null
  config_schema: null
  user_template: null
  allow_user_override: true
  merge_strategy: merge
task_paths:
- tasks
resources:
  templates: {}
  data: {}
  assets: {}
build:
  include:
  - src/**/*.py
  - tasks/**/*.yaml
  - config/**/*
  - manifest.yaml
  - requirements.txt
  exclude:
  - '**/__pycache__'
  - '**/*.pyc'
  - '**/.pytest_cache'
metadata:
  changelog:
  - version: 1.0.0
    date: '2026-01-12'
    changes:
      added:
      - Initial manifest.yaml creation
      - 'Core services: vision, ocr, controller, screen, process_manager, app, config,
        composite-interaction'
      - 50+ atomic actions for automation
